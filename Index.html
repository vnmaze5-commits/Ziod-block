<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Pro Glow</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }
        #score { font-size: 45px; font-weight: bold; color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin: 0; }
        #best { font-size: 14px; color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
        
        canvas {
            background: #11111d;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            touch-action: none;
        }

        #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #game-over h1 { color: #ff0055; font-size: 50px; text-shadow: 0 0 10px #ff0055; }
        #game-over button {
            background: #00f2ff; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui">
        <p id="best">BEST: <span id="high">0</span></p>
        <h1 id="score">0</h1>
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-p" style="font-size: 20px;"></p>
        <button onclick="location.reload()">RESTART</button>
    </div>
    
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highEl = document.getElementById('high');

        // Sound Engine
        const au = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(f, t, d, v=0.1) {
            const o = au.createOscillator();
            const g = au.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(v, au.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, au.currentTime + d);
            o.connect(g); g.connect(au.destination);
            o.start(); o.stop(au.currentTime + d);
        }

        let GRID = 8;
        let score = 0;
        let best = localStorage.getItem('bb_best_new') || 0;
        highEl.innerText = best;

        let cw = Math.min(window.innerWidth * 0.95, 420);
        canvas.width = cw;
        canvas.height = cw + 180;
        let cs = cw / GRID;

        let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
        let tray = [];
        let particles = [];

        const shapes = [
            { c: '#00f2ff', d: [[1,1],[1,1]] }, // Square
            { c: '#ff007b', d: [[1,1,1,1]] },   // Line
            { c: '#7cfc00', d: [[1,1,1],[0,1,0]] }, // T
            { c: '#ffcf00', d: [[1,1,1]] },   // Short Line
            { c: '#bc13fe', d: [[1,1],[0,1],[0,1]] }, // L
            { c: '#ff3d00', d: [[1]] } // Dot
        ];

        function fillTray() {
            tray = [];
            for(let i=0; i<3; i++){
                let s = shapes[Math.floor(Math.random()*shapes.length)];
                tray.push({...s, x: (cw/3)*i + 15, y: cw + 60, ox: (cw/3)*i + 15, oy: cw + 60, scale: 0.5});
            }
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({x, y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, a:1, c:color});
            }
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // Grid Background
            for(let r=0; r<GRID; r++){
                for(let c=0; c<GRID; c++){
                    ctx.fillStyle = board[r][c] || '#1a1a2e';
                    if(board[r][c]) {
                        ctx.shadowBlur = 15; ctx.shadowColor = board[r][c];
                    } else { ctx.shadowBlur = 0; }
                    ctx.fillRect(c*cs+2, r*cs+2, cs-4, cs-4);
                }
            }
            ctx.shadowBlur = 0;

            // Tray Blocks
            tray.forEach(b => {
                ctx.fillStyle = b.c;
                ctx.shadowBlur = 10; ctx.shadowColor = b.c;
                let size = cs * b.scale;
                b.d.forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) ctx.fillRect(b.x + ci*size, b.y + ri*size, size-2, size-2);
                    });
                });
            });
            ctx.shadowBlur = 0;

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.a -= 0.02;
                if(p.a <= 0) particles.splice(i, 1);
                ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(draw);
        }

        let drag = null, sx, sy;

        canvas.addEventListener('touchstart', e => {
            if(au.state === 'suspended') au.resume();
            let r = canvas.getBoundingClientRect();
            let tx = e.touches[0].clientX - r.left;
            let ty = e.touches[0].clientY - r.top;

            tray.forEach(b => {
                if(tx > b.x - 20 && tx < b.x + 100 && ty > b.y - 20 && ty < b.y + 120){
                    drag = b; drag.scale = 1.0;
                    sx = (b.d[0].length * cs) / 2;
                    sy = (b.d.length * cs) * 1.3; // Block above finger
                    sfx(400, 'sine', 0.1);
                }
            });
        });

        canvas.addEventListener('touchmove', e => {
            if(!drag) return;
            let r = canvas.getBoundingClientRect();
            drag.x = e.touches[0].clientX - r.left - sx;
            drag.y = e.touches[0].clientY - r.top - sy;
        });

        canvas.addEventListener('touchend', () => {
            if(!drag) return;
            let gx = Math.round(drag.x / cs);
            let gy = Math.round(drag.y / cs);

            if(canFit(drag, gy, gx)){
                for(let r=0; r<drag.d.length; r++){
                    for(let c=0; c<drag.d[0].length; c++){
                        if(drag.d[r][c]) {
                            board[gy+r][gx+c] = drag.c;
                            spawnParticles((gx+c)*cs + cs/2, (gy+r)*cs + cs/2, drag.c);
                        }
                    }
                }
                score += 10;
                scoreEl.innerText = score;
                sfx(600, 'triangle', 0.1, 0.2);
                tray = tray.filter(i => i !== drag);
                if(tray.length === 0) fillTray();
                checkLines();
            } else {
                drag.x = drag.ox; drag.y = drag.oy; drag.scale = 0.5;
                sfx(150, 'sawtooth', 0.1);
            }
            drag = null;
            checkGameOver();
        });

        function canFit(b, r, c){
            if(r < 0 || c < 0 || r+b.d.length > GRID || c+b.d[0].length > GRID) return false;
            for(let i=0; i<b.d.length; i++){
                for(let j=0; j<b.d[0].length; j++){
                    if(b.d[i][j] && board[r+i][c+j]) return false;
                }
            }
            return true;
        }

        function checkLines(){
            let r_cl = [], c_cl = [];
            for(let i=0; i<GRID; i++){
                if(board[i].every(x => x !== null)) r_cl.push(i);
                let f = true;
                for(let j=0; j<GRID; j++) if(!board[j][i]) f=false;
                if(f) c_cl.push(i);
            }
            if(r_cl.length || c_cl.length){
                sfx(800, 'square', 0.3, 0.1);
                score += (r_cl.length + c_cl.length) * 100;
                scoreEl.innerText = score;
                r_cl.forEach(r => board[r] = Array(GRID).fill(null));
                c_cl.forEach(c => { for(let r=0; r<GRID; r++) board[r][c] = null; });
            }
        }

        function checkGameOver(){
            let possible = false;
            tray.forEach(b => {
                for(let r=0; r<=GRID-b.d.length; r++){
                    for(let c=0; c<=GRID-b.d[0].length; c++){
                        if(canFit(b, r, c)) possible = true;
                    }
                }
            });
            if(!possible && tray.length > 0){
                if(score > best) localStorage.setItem('bb_best_new', score);
                document.getElementById('final-p').innerText = "Score: " + score;
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        fillTray();
        draw();
    </script>
</body>
</html>
